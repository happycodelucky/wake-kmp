# mise — toolchain pins and task surface for the Wake KMP repo.
# Run `mise install` to provision tools; `mise tasks` to list runnable tasks.
#
# Keep this file in sync with:
#   gradle/libs.versions.toml                 (jdk target, AGP, Kotlin)
#   gradle/wrapper/gradle-wrapper.properties  (distributionUrl)
#
# Single source of truth for non-Gradle build deps. Versions for Kotlin,
# AGP, SKIE, KMMBridge, ktlint-gradle, etc. live in gradle/libs.versions.toml
# (CLAUDE.md §2, §10) — mise must not duplicate them.
#
# Bootstrap on a fresh machine:
#   brew install mise
#   mise trust
#   mise install
#
# Xcode is NOT managed by mise. Install the latest stable Xcode that SKIE
# supports; CONTRIBUTING.md records the current minimum.

[tools]
java   = "temurin-21.0.11+10.0.LTS"   # CLAUDE.md §2 — JDK 21 LTS, Apple Silicon aarch64.
gradle = "9.5.1"                       # Matches gradle/wrapper/gradle-wrapper.properties.
gh     = "2.94.0"                       # release.yml (deferred) uses `gh release create`.

# Deliberately NOT pinned here:
#   - kotlin: gradle/libs.versions.toml owns it (CLAUDE.md §2).
#   - cocoapods: forbidden (CLAUDE.md §9, §13).
#   - node: not used in this repo.
#   - xcodegen / swiftlint / swiftformat: sample apps are deferred (CLAUDE.md §4).

# ---------------------------------------------------------------------------
# Tasks. Naming: `domain:action`, colon-separated, lowercase.
# Lowercase ios/macos in task names is fine — these are CLI tokens, not
# source-identifier symbols. The Apple-casing rule (CLAUDE.md §3) still
# applies to file names, types, and comments.
# ---------------------------------------------------------------------------

# --- check / lint / format -------------------------------------------------

# Both published modules are listed explicitly. Gradle's `check` is
# per-project — `:wake:check` alone never runs `:wake-testing`'s test suite.
# `check` also runs the public-API/ABI gate (`checkKotlinAbi`) — it fails if the
# public surface changed without a deliberate `mise run api:dump`.
[tasks.check]
description = "Full local check — what CI runs: ktlint + detekt + the API/ABI check + every unit test, both modules."
run = "./gradlew :wake:check :wake-testing:check"

# --- test ------------------------------------------------------------------
# `test` is the fast inner loop (macOS arm64 only — covers commonTest). The
# per-platform tasks below back the split CI legs (Ubuntu runs test:jvm +
# test:android; macOS runs the Apple targets via `check`).

[tasks.test]
description = "Fast inner-loop tests — macOS arm64 only (covers commonTest), both modules."
run = "./gradlew :wake:macosArm64Test :wake-testing:macosArm64Test"

[tasks."test:jvm"]
description = "JVM unit tests (fastest — no K/N compile; covers commonTest + the live jvmShared loopback test), both modules."
run = "./gradlew :wake:jvmTest :wake-testing:jvmTest"

[tasks."test:android"]
description = "Android host unit tests, both modules."
run = "./gradlew :wake:testAndroidHostTest :wake-testing:testAndroidHostTest"

[tasks."test:ios"]
description = "iOS simulator arm64 tests (slower — boots a simulator), both modules."
run = "./gradlew :wake:iosSimulatorArm64Test :wake-testing:iosSimulatorArm64Test"

[tasks."test:apple"]
description = "Both Apple test targets (macOS arm64 + iOS simulator arm64), both modules."
depends = ["test", "test:ios"]

[tasks."test:all"]
description = "Every test target across every platform, both modules."
depends = ["test", "test:ios", "test:android", "test:jvm"]

[tasks.lint]
description = "ktlint + detekt only (no tests), both published modules."
run = "./gradlew :wake:ktlintCheck :wake:detekt :wake-testing:ktlintCheck :wake-testing:detekt"

[tasks.format]
description = "ktlint auto-fix, both published modules."
run = "./gradlew :wake:ktlintFormat :wake-testing:ktlintFormat"

# --- public API / ABI ------------------------------------------------------
# The committed dump under wake/api/ is the reference for the public surface.
# `api:check` runs as part of `check` (and CI) — it fails if the public API
# changed without a deliberate `api:dump`. Review the api/ diff like code.
# Only `:wake` is pinned; `:wake-testing` opts out of ABI validation (it ships
# test fakes whose surface is meant to flex — see wake-testing/build.gradle.kts).

[tasks."api:check"]
description = "Verify the public API/ABI of :wake matches the committed dump (also runs inside `check`)."
run = "./gradlew :wake:checkKotlinAbi"

[tasks."api:dump"]
description = "Regenerate the committed public API/ABI dump for :wake after an INTENTIONAL public change. Review + commit the api/ diff."
run = "./gradlew :wake:updateKotlinAbi"

# --- build health ----------------------------------------------------------

[tasks."dependencies:analyze"]
description = "Dependency hygiene: unused deps, api-vs-implementation misuse, undeclared transitives (dependency-analysis)."
run = "./gradlew buildHealth"

[tasks."build:doctor"]
description = "Surface Gradle Doctor build-health diagnostics (slow config, cache misuse, JVM mismatches)."
run = "./gradlew assemble --dry-run"

# --- build -----------------------------------------------------------------

[tasks.build]
description = "Assemble the release WakeKit.xcframework (sample-app local SPM)."
run = "./gradlew :wake:assembleWakeKitXCFramework"

[tasks."build:ios"]
description = "Link debug iOS framework slices (device + Apple Silicon simulator)."
run = """
./gradlew :wake:linkDebugFrameworkIosArm64 \
          :wake:linkDebugFrameworkIosSimulatorArm64
"""

[tasks."build:macos"]
description = "Link the debug macOS framework slice (Apple Silicon)."
run = "./gradlew :wake:linkDebugFrameworkMacosArm64"

[tasks."build:android"]
description = "Assemble the Android AAR."
run = "./gradlew :wake:assembleAndroidMain"

[tasks."build:jvm"]
description = "Compile + jar the JVM desktop target."
run = "./gradlew :wake:jvmJar"

[tasks.xcframework]
description = "Alias for `build` — produces the release WakeKit.xcframework."
depends = ["build"]

# --- iteration helpers -----------------------------------------------------

[tasks."spm:dev"]
description = "Rebuild the debug WakeKit.xcframework and point /Package.swift at it (local dev mode)."
# KMMBridge's `spmDevBuild` builds the debug XCFramework and REWRITES the root
# /Package.swift to a `.binaryTarget(path: …)` pointing at
# wake/build/XCFrameworks/debug/WakeKit.xcframework. After the first tagged
# release the committed Package.swift is the *released* form (a remote
# `.binaryTarget(url:checksum:)`). The local-dev rewrite is working-tree-only:
# do NOT commit it. `mise run spm:restore` puts the committed version back.
run = "./gradlew :wake:spmDevBuild"

[tasks."spm:restore"]
description = "Restore the committed (released) /Package.swift after spm:dev rewrote it."
run = "git restore Package.swift"

# --- docs ------------------------------------------------------------------

[tasks.docs]
description = "Generate the Dokka API-reference HTML (output under build/dokka/html)."
run = "./gradlew dokkaGenerate"

# --- dependencies ----------------------------------------------------------
# Renovate (renovate.json5) opens PRs in CI; these are the local equivalents.

[tasks."dependencies:outdated"]
description = "List dependencies with newer stable versions (ben-manes gradle-versions-plugin)."
run = "./gradlew dependencyUpdates -Drevision=release"

[tasks."dependencies:update"]
description = "Rewrite gradle/libs.versions.toml to the latest stable versions, then review the diff (version-catalog-update)."
# Not truly interactive: it rewrites the catalog; review with `git diff
# gradle/libs.versions.toml` and accept or revert. Web-search any bump that
# crosses the Kotlin/SKIE pin before accepting (CLAUDE.md §2).
run = "./gradlew versionCatalogUpdate"

# --- aggregates ------------------------------------------------------------

[tasks.ci]
description = "Run the exact CI gate locally: full check + release WakeKit.xcframework."
run = "./gradlew :wake:check :wake-testing:check :wake:assembleWakeKitXCFramework"

# --- housekeeping ----------------------------------------------------------

[tasks.clean]
description = "Gradle clean."
run = "./gradlew clean"
