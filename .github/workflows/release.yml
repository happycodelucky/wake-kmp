name: Release

# Two distribution channels ship from this workflow:
#
#   1. Maven Central (vanniktech plugin) — Android AAR, kotlinMultiplatform
#      metadata, per-target klibs (incl. the jvm target). For Gradle / KMP
#      consumers.
#   2. GitHub Releases (KMMBridge) — the SKIE-enhanced WakeKit.xcframework
#      zip, attached to the vX.Y.Z release and referenced from the root
#      Package.swift by URL + checksum. For pure-Swift SPM consumers; no
#      Gradle build, no authentication. GitHub *Releases*, not GitHub
#      *Packages* — Packages requires a PAT even to download from public
#      repos, which is unusable for an open-source Swift package.
#
# SPM ordering constraint: the version tag must contain a Package.swift
# whose URL + checksum point at an asset that already exists. KMMBridge
# resolves the chicken-and-egg the same way Touchlab's own flow does —
# create the release (and tag) first, upload the zip, regenerate
# Package.swift, then commit it and force-move the tag onto that commit.
#
# The runner picks `bumpType` (patch / minor / major); the workflow computes
# the actual version from the latest GitHub Release. The chosen component
# is incremented and every component below it resets to zero — standard
# semver. Runners never type a version number; they only choose the axis.
#
# Examples (latest release = v0.3.7):
#   bumpType=patch                             → 0.3.8
#   bumpType=minor                             → 0.4.0
#   bumpType=major                             → 1.0.0
#   bumpType=patch + versionSuffix=beta        → 0.3.8-beta
#   bumpType=minor + versionSuffix=rc.1        → 0.4.0-rc.1
#   bumpType=major + versionSuffix=preview     → 1.0.0-preview
#
# The optional `versionSuffix` input adds a SemVer pre-release identifier
# (`MAJOR.MINOR.PATCH-SUFFIX`). Pre-release versions sort before their
# corresponding final release in semver — `0.4.0-rc.1` is older than
# `0.4.0`. The suffix is validated against the SemVer 2.0 grammar before
# anything is published.
#
# `dryRun` defaults to `true` because Maven Central releases are
# **irreversible** — Sonatype never deletes a published artifact. The dry
# run uploads to the Central Portal staging area only and stops there,
# so the artifact set can be reviewed on https://central.sonatype.com/
# before manually clicking Publish (or Drop). Flip the input to `false`
# to publish + auto-release in one step.
on:
  workflow_dispatch:
    inputs:
      bumpType:
        description: Which semver component to bump from the latest release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      versionSuffix:
        description: Optional pre-release suffix appended after a dash (e.g. beta, preview, rc.1)
        required: false
        type: string
        default: ""
      dryRun:
        description: Upload to Central staging only; do not auto-release. Default true.
        required: true
        type: boolean
        default: true

# `contents: write` covers everything the SPM side needs: KMMBridge creating
# the GitHub Release + uploading the XCFramework zip asset, the Package.swift
# commit pushed back to main, and the force-moved version tag. All of it
# happens only on `dryRun=false` — see the SPM steps below.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    # The four MAVEN_CENTRAL_* secrets live on the `continuous-deployment`
    # GitHub environment, not the repository scope. Without this binding
    # `secrets.MAVEN_CENTRAL_*` resolves to the empty string at runtime
    # and vanniktech fails with cryptic auth / signing errors that look
    # like a credentials problem in the downstream tool.
    environment: continuous-deployment

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so `gh release create --generate-notes` can walk
          # commits between the previous tag and this release.
          fetch-depth: 0

      # Compute the version up front so every downstream step references
      # the same value. The version is derived from the latest GitHub
      # Release: `bumpType` picks which component to increment, and every
      # component below it resets to zero — standard semver.
      #
      #   latest 0.9.0  + bumpType=patch  → 0.9.1
      #   latest 0.9.3  + bumpType=minor  → 0.10.0
      #   latest 0.9.3  + bumpType=major  → 1.0.0
      #
      # Because a re-run computes the *same* version (no run-number in the
      # patch), the "Verify version not already published" step and the
      # tag-exists guard are what catch an accidental repeat.
      #
      # First-release fallback: if no previous release exists yet, the base
      # is 0.0.0, so bumpType patch/minor/major yields 0.0.1 / 0.1.0 / 1.0.0.
      - name: Compute release version
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_TYPE: ${{ inputs.bumpType }}
          VERSION_SUFFIX: ${{ inputs.versionSuffix }}
        run: |
          set -euo pipefail

          # Latest tag, or empty if there are no releases yet.
          LATEST=$(gh release view --json tagName -q .tagName 2>/dev/null || true)

          if [[ -n "$LATEST" ]]; then
            # Strip the leading `v` and any pre-release suffix (e.g.
            # v0.3.7-beta → 0.3.7) before parsing — we always bump from
            # the numeric core, not from a previous pre-release suffix.
            BASE=${LATEST#v}
            BASE=${BASE%%-*}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          else
            echo "No previous release found; starting from 0.0.0 base."
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          # Each bump increments its own component and zeroes everything
          # below it — standard semver. `patch` from 0.9.0 → 0.9.1,
          # `minor` from 0.9.3 → 0.10.0, `major` from 0.9.3 → 1.0.0.
          case "$BUMP_TYPE" in
            patch)
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$MINOR
              NEW_PATCH=$((PATCH + 1))
              ;;
            minor)
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$((MINOR + 1))
              NEW_PATCH=0
              ;;
            major)
              NEW_MAJOR=$((MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            *)
              echo "::error::Unknown bumpType: $BUMP_TYPE"
              exit 1
              ;;
          esac

          RELEASE_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"

          # Optional pre-release suffix. Validate against the SemVer 2.0
          # pre-release identifier grammar: dot-separated alphanumerics and
          # hyphens, each segment starting with an alphanumeric. The regex
          # below covers the common cases (beta, preview, rc.1, alpha.2.fix)
          # and rejects whitespace, leading dashes, and uppercase (which
          # Maven Central treats as a version-comparison foot-gun).
          if [[ -n "$VERSION_SUFFIX" ]]; then
            # Each dot-separated segment must start with an alphanumeric
            # character. Hyphens are allowed inside a segment but not at
            # its start — otherwise `0.3.8-` + `-beta` produces `0.3.8--beta`,
            # which version-comparators handle inconsistently.
            if [[ ! "$VERSION_SUFFIX" =~ ^[0-9a-z][0-9a-z-]*(\.[0-9a-z][0-9a-z-]*)*$ ]]; then
              echo "::error::versionSuffix '$VERSION_SUFFIX' is not a valid SemVer pre-release identifier."
              echo "::error::Allowed: dot-separated lowercase alphanumeric segments (hyphens permitted inside a segment). Examples: beta, preview, rc.1, alpha.2.fix."
              exit 1
            fi
            RELEASE_VERSION="${RELEASE_VERSION}-${VERSION_SUFFIX}"
          fi

          RELEASE_TAG="v${RELEASE_VERSION}"

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

          # Surface the computed version in the run-page summary so the
          # runner can see it before the irreversible publish step fires.
          # If something looks wrong, cancel the run from the Actions UI.
          {
            echo "## Release plan"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Previous release | \`${LATEST:-(none)}\` |"
            echo "| Bump type | \`${BUMP_TYPE}\` |"
            echo "| Suffix | \`${VERSION_SUFFIX:-(none)}\` |"
            echo "| **Computed version** | **\`${RELEASE_VERSION}\`** |"
            echo "| Tag | \`${RELEASE_TAG}\` |"
            echo "| Dry run? | \`${{ inputs.dryRun }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Computed release version: $RELEASE_VERSION"

      # Belt-and-suspenders safety check: fail before any publish if the
      # computed version is already on Maven Central. Sonatype rejects
      # re-uploads with a confusing "staging failed" error; surfacing the
      # collision here gives a clear "this version is already published"
      # message and saves a few minutes of build time on a doomed run.
      #
      # Checks every module that ships under com.happycodelucky.wake. The
      # two artifacts version together, so a collision on either one means
      # the run can't proceed. The grep is exact-match for
      # `<version>X.Y.Z</version>` to avoid substring matches (e.g.
      # version 0.3.1 matching 0.3.10).
      - name: Verify version not already published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Releases run from main only. KMMBridge creates the GitHub Release
          # tag against the *default branch* HEAD, and the Package.swift
          # commit below pushes to main — running from any other ref would
          # tag and commit the wrong history.
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::Releases must run from main (got '${GITHUB_REF_NAME}')."
            exit 1
          fi

          ESCAPED="${RELEASE_VERSION//./\\.}"
          for ARTIFACT in wake wake-testing; do
            METADATA_URL="https://repo1.maven.org/maven2/com/happycodelucky/wake/${ARTIFACT}/maven-metadata.xml"
            if curl -sf "$METADATA_URL" 2>/dev/null | grep -qE "<version>${ESCAPED}</version>"; then
              echo "::error::Version $RELEASE_VERSION is already published as com.happycodelucky.wake:${ARTIFACT} on Maven Central."
              echo "::error::Maven Central refuses to overwrite published artifacts. Cut a new release with a higher bumpType, or set versionSuffix for a pre-release."
              exit 1
            fi
          done

          # Same guard for the SPM side: KMMBridge aborts if a GitHub Release
          # for the tag already exists (useExistingRelease=false), but that
          # would fire *after* the irreversible Maven Central publish.
          # Catching it here fails the run while it's still free.
          if gh release view "$RELEASE_TAG" --json tagName >/dev/null 2>&1; then
            echo "::error::A GitHub Release for $RELEASE_TAG already exists. Delete it (and its tag) or cut a different version."
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Tag $RELEASE_TAG already exists. Delete it or cut a different version."
            exit 1
          fi

          echo "Version $RELEASE_VERSION is not yet on Maven Central and $RELEASE_TAG is unused — safe to publish."

      # mise pins JDK, gradle, etc. (see /mise.toml). setup-gradle below is
      # layered on top solely for its build / dependency cache.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Pinned at v5 rather than v6: v6 moved caching to a commercially-
      # licensed component. v5 keeps the freely-licensed caching and runs
      # on Node 24. See .github/workflows/ci.yml for the full rationale.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      # Vanniktech `mavenPublishing { }` exposes two umbrella tasks (the
      # config lives in the `wake.publish` convention plugin). The "stops at
      # staging" behaviour of the dry-run task is contingent on
      # `automaticRelease = false` in that plugin — if that ever flips back
      # to `true` the dry run silently becomes a real publish. See the
      # comments on `publishToMavenCentral(automaticRelease = …)` in
      # gradle/plugins/src/main/kotlin/wake.publish.gradle.kts.
      #
      #   * publishToMavenCentral             — build + sign + upload to
      #     Central staging. STOPS before the irreversible "release" step.
      #     Used for dry runs; review the staged deployment on
      #     https://central.sonatype.com/ before manually publishing.
      #
      #   * publishAndReleaseToMavenCentral   — full pipeline. Uploads,
      #     closes the deployment, and releases it to public Maven Central.
      #     Cannot be undone. Used only when `dryRun=false`.
      #
      # The Gradle invocation is *not* scoped to a specific module
      # (no `:wake:` prefix) — that way it runs across every module that
      # declares a `mavenPublishing { }` block. Currently that's `:wake`
      # and `:wake-testing`, which version and ship together. Adding a new
      # publishable module is free: declare the block and the next release
      # picks it up.
      #
      # Both tasks publish every publication the KMP plugin registered
      # (Android AAR, kotlinMultiplatform metadata, the jvm jar, iosArm64,
      # iosSimulatorArm64, macosArm64 klibs) plus their sources / javadoc
      # jars and detached GPG signatures. Snapshot versions (anything
      # ending in `-SNAPSHOT`) auto-route to the Central Portal snapshots
      # endpoint.
      - name: Publish to Maven Central (dry run — staging only)
        if: ${{ inputs.dryRun }}
        env:
          # Vanniktech reads these four properties; Gradle auto-populates
          # them from ORG_GRADLE_PROJECT_* env vars. See .github/PUBLISHING.md.
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # In-memory GPG key: paste the full ASCII-armoured private key
          # block (`-----BEGIN PGP PRIVATE KEY BLOCK-----` … `-----END PGP
          # PRIVATE KEY BLOCK-----`) into the GitHub secret. No keyring on
          # the runner; vanniktech imports the key in-process.
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew publishToMavenCentral \
            -Pversion="$RELEASE_VERSION" --no-daemon

      - name: Publish to Maven Central (release — IRREVERSIBLE)
        if: ${{ !inputs.dryRun }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew publishAndReleaseToMavenCentral \
            -Pversion="$RELEASE_VERSION" --no-daemon

      # --- SPM distribution (KMMBridge) ----------------------------------
      #
      # Runs only on a real publish — a dry run uploads nothing, so there is
      # no asset for Package.swift to reference. `kmmBridgePublish` does the
      # heavy lifting in one Gradle invocation:
      #
      #   1. Builds the SKIE-enhanced release WakeKit.xcframework (all three
      #      slices: iosArm64, iosSimulatorArm64, macosArm64).
      #   2. Zips it and creates the GitHub Release tagged `vX.Y.Z` (the tag
      #      lands on the default-branch HEAD — moved onto the Package.swift
      #      commit two steps later).
      #   3. Uploads `WakeKit.xcframework.zip` as a release asset.
      #   4. Regenerates the root Package.swift with the asset URL + sha256
      #      checksum.
      #
      # Two non-obvious requirements (kmmbridge 1.2.1):
      #   * `-PENABLE_PUBLISHING=true` — KMMBridge only registers the
      #     `kmmBridgePublish` task when this property is set. Passed on the
      #     CI command line only, so local builds can never accidentally
      #     publish.
      #   * `GITHUB_REPO` / `GITHUB_PUBLISH_TOKEN` — KMMBridge reads these
      #     as *Gradle properties* (not env vars), hence the
      #     ORG_GRADLE_PROJECT_ prefix, which Gradle maps onto project
      #     properties of the un-prefixed name.
      - name: Publish XCFramework to GitHub Release (KMMBridge)
        if: ${{ !inputs.dryRun }}
        env:
          ORG_GRADLE_PROJECT_GITHUB_REPO: ${{ github.repository }}
          ORG_GRADLE_PROJECT_GITHUB_PUBLISH_TOKEN: ${{ github.token }}
        run: |
          ./gradlew :wake:kmmBridgePublish \
            -Pversion="$RELEASE_VERSION" \
            -PENABLE_PUBLISHING=true \
            --no-daemon

      # KMMBridge writes the GitHub *API* asset URL into Package.swift
      # (https://api.github.com/repos/…/releases/assets/<id>.zip). SPM can
      # consume that — it sends `Accept: application/octet-stream` — but the
      # URL serves JSON to plain HTTP clients and every download burns the
      # anonymous API quota (60 requests/hour/IP), which bites shared CI
      # egress IPs. The public browser URL serves the same bytes (same
      # checksum) with no quota and no special headers, and is fully
      # deterministic: tag + fixed asset name. Rewrite, then prove the
      # manifest still parses (`dump-package` is offline — it never fetches
      # the binary).
      - name: Point Package.swift at the public release-asset URL
        if: ${{ !inputs.dryRun }}
        run: |
          set -euo pipefail
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/WakeKit.xcframework.zip"

          sed -i '' -E "s|^let remoteKotlinUrl = .*$|let remoteKotlinUrl = \"${ASSET_URL}\"|" Package.swift

          # Belt-and-braces: if KMMBridge ever renames the variable, sed
          # silently matches nothing — catch that here instead of shipping a
          # tag whose Package.swift still points at the API URL.
          grep -qF "$ASSET_URL" Package.swift
          swift package dump-package > /dev/null
          echo "Package.swift now references $ASSET_URL"

      # The version tag must contain this Package.swift — SPM consumers
      # resolve the manifest *from the tag*, then download the binary it
      # references. KMMBridge created the tag against the pre-release HEAD
      # when it created the GitHub Release, so after committing the
      # regenerated Package.swift to main, force-move the tag onto that
      # commit (same approach as Touchlab's ga-update-release-tag action).
      # Finally, fill in the release title + auto-generated notes — KMMBridge
      # creates the release bare.
      - name: Commit Package.swift, move tag, finalize release notes
        if: ${{ !inputs.dryRun }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add Package.swift
          git commit -m "release: Package.swift for $RELEASE_TAG"

          # If main moved while Maven Central was uploading, rebase the
          # one-commit delta rather than failing the push.
          git pull --rebase origin main
          git push origin HEAD:main

          git tag -fa "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push --force origin "refs/tags/$RELEASE_TAG"

          # `gh release edit` has no --generate-notes; ask the API for the
          # generated body and attach it.
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" --jq .body > release-notes.md
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --latest
          rm -f release-notes.md

      - name: Summary
        run: |
          if [[ "${{ inputs.dryRun }}" == "true" ]]; then
            echo "✅ Dry run complete. Review the staged deployment at:"
            echo "   https://central.sonatype.com/publishing/deployments"
            echo "   Click 'Publish' to release $RELEASE_VERSION, or 'Drop' to discard."
          else
            echo "🚀 Released com.happycodelucky.wake:wake:$RELEASE_VERSION to Maven Central."
            echo "   Maven Central: https://central.sonatype.com/artifact/com.happycodelucky.wake/wake/$RELEASE_VERSION"
            echo "   GitHub Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/$RELEASE_TAG"
            echo "   SPM: add https://github.com/${GITHUB_REPOSITORY}.git pinned to $RELEASE_TAG (XCFramework zip is a release asset)."
            echo "   Note: Maven Central indexing can take up to ~30 min to appear in https://repo1.maven.org/maven2/."
          fi
