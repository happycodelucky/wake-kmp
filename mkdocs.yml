site_name: Wake
site_description: >-
  Kotlin Multiplatform Wake-on-LAN / Wake-on-Wireless — send a magic packet over
  UDP broadcast to wake a device by MAC address, on iOS, macOS, and Android.
site_url: https://happycodelucky.github.io/wake/
repo_url: https://github.com/happycodelucky/wake
repo_name: happycodelucky/wake

# Minimal stub for the initial scaffold. The full nav (concepts, recipes,
# platforms) is deferred; the generated API reference under docs/api/ comes from
# Dokka via `mise run docs:dokka` / the root `copyDokkaToDocs` Gradle task.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Overview: index.md
